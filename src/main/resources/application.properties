spring.application.name=primer-proyecto

# Puerto del servidor (8081 para evitar conflictos)
server.port=8081

# ============================================================================
# CONFIGURACIÓN DE BASE DE DATOS
# ============================================================================
# Estamos usando SQLite porque:
# - Es simple (no requiere servidor externo)
# - Perfecta para aprender JPA/Hibernate
# - Ideal para prototipos y desarrollo
# En producción usarías: MySQL, PostgreSQL, SQL Server, etc.

# URL de conexión: ¿dónde está la BD?
# jdbc:sqlite:usuarios.db = crear archivo 'usuarios.db' en la raíz del proyecto
spring.datasource.url=jdbc:sqlite:usuarios.db

# Driver JDBC para SQLite
# El driver es el "intermediario" entre Java y la BD SQLite
spring.datasource.driver-class-name=org.sqlite.JDBC

# ============================================================================
# CONFIGURACIÓN JPA/HIBERNATE
# ============================================================================
# Hibernate es el ORM (Object-Relational Mapping) que convierte:
# Objetos Java ↔ Tablas SQL

# ddl-auto=update: Qué hacer con las tablas al iniciar?
# - validate: solo verifica que existan (no crea ni modifica)
# - create:   borra todo y crea nuevo (PELIGROSO en producción)
# - create-drop: crea al iniciar, borra al apagar (para tests)
# - update:   RECOMENDADO en desarrollo - crea si no existen, no borra
# - none:     no hace nada (manual)
spring.jpa.hibernate.ddl-auto=update

# show-sql=true: Muestra en consola todas las queries SQL generadas
# Útil para aprender qué SQL genera Hibernate
# En producción lo pones en false para evitar logs enormes
spring.jpa.show-sql=true

# Dialecto para SQLite
# Le dice a Hibernate "estamos usando SQLite, genera SQL compatible con esto"
# Cada BD tiene su propio dialecto (MySQL, PostgreSQL, etc.)
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Spring Security está deshabilitado en: src/main/java/com/primerproyecto/api/config/SecurityConfig.java