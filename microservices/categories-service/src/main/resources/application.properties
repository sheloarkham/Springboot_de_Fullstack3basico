spring.application.name=categories-service

# Puerto del servidor - Microservicio de Categorías
server.port=8082

# ============================================================================
# CONFIGURACIÓN DE BASE DE DATOS - CATEGORIES SERVICE
# ============================================================================
# Cada microservicio tiene su propia base de datos
spring.datasource.url=jdbc:sqlite:categories.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# ============================================================================
# CONFIGURACIÓN JPA/HIBERNATE
# ============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Spring Security deshabilitado para desarrollo
